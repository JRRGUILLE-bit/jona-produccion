<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#050505">
  <title>Jonah tenía 15 años — Producción</title>
  <style>
    @font-face{
      font-family:"1942 Report";
      src:url("1942.ttf") format("truetype");
      font-weight:400;
      font-style:normal;
      font-display:swap;
    }
    :root{
      --bg:#030303;
      --ink:#f2eee4;
      --muted:#b9b0a2;
      --soft:#171717;
      --line:rgba(242,238,228,.18);
      --line-strong:rgba(242,238,228,.38);
      --panel:rgba(5,5,5,.68);
      --panel-hover:rgba(18,18,18,.82);
      --shadow:0 24px 70px rgba(0,0,0,.65);
    }
    *{box-sizing:border-box}
    html{min-height:100%;background:var(--bg)}
    body{
      margin:0;
      min-height:100vh;
      color:var(--ink);
      font-family:"1942 Report","Courier Prime","Courier New",monospace;
      background:#030303;
      overflow-x:hidden;
    }
    body::before{
      content:"";
      position:fixed;
      inset:0;
      z-index:-3;
      background:url("637e6d07-f6da-4d28-a1c4-03eb94488f75.png") center/cover no-repeat;
      opacity:1;
      filter:brightness(1.65) contrast(1.45);
    }
    body::after{
      content:"";
      position:fixed;
      inset:0;
      z-index:-2;
      background:
        radial-gradient(circle at center,rgba(0,0,0,.00) 0,rgba(0,0,0,.10) 42%,rgba(0,0,0,.32) 100%),
        linear-gradient(180deg,rgba(0,0,0,.00),rgba(0,0,0,.22));
      pointer-events:none;
    }
    .page{
      width:min(1120px,100%);
      margin:0 auto;
      min-height:100vh;
      padding:clamp(24px,5vw,58px) 18px 26px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:clamp(28px,5vw,48px);
    }
    header{text-align:center}
    .kicker{
      margin:0 0 13px;
      color:var(--muted);
      font-size:clamp(13px,2vw,17px);
      letter-spacing:.14em;
      text-transform:uppercase;
      text-shadow:0 2px 18px rgba(0,0,0,.85);
    }
    h1{
      margin:0;
      font-weight:400;
      font-size:clamp(48px,10.5vw,118px);
      line-height:.92;
      letter-spacing:.012em;
      text-shadow:0 4px 36px rgba(0,0,0,.9);
    }
    .subtitle{
      max-width:760px;
      margin:20px auto 0;
      color:rgba(242,238,228,.78);
      font-family:"Courier New",monospace;
      font-size:clamp(13px,2vw,16px);
      line-height:1.55;
      text-shadow:0 2px 18px rgba(0,0,0,.95);
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:clamp(14px,2.4vw,24px);
    }
    .card{
      appearance:none;
      border:1px solid var(--line);
      background:linear-gradient(180deg,rgba(15,15,15,.74),rgba(2,2,2,.66));
      color:var(--ink);
      border-radius:28px;
      padding:clamp(16px,2.8vw,26px);
      min-height:300px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:18px;
      cursor:pointer;
      box-shadow:var(--shadow);
      backdrop-filter:blur(5px);
      transition:transform .16s ease,border-color .16s ease,background .16s ease,box-shadow .16s ease;
      font:inherit;
      text-align:center;
    }
    .card:hover,.card:focus-visible{
      transform:translateY(-4px);
      border-color:var(--line-strong);
      background:linear-gradient(180deg,rgba(25,25,25,.82),rgba(5,5,5,.76));
      box-shadow:0 30px 80px rgba(0,0,0,.78);
      outline:none;
    }
    .icon-wrap{
      width:min(178px,48vw);
      aspect-ratio:1/1;
      border-radius:24px;
      display:grid;
      place-items:center;
      background:rgba(0,0,0,.42);
      border:1px solid rgba(242,238,228,.12);
      overflow:hidden;
    }
    .icon-wrap img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      filter:contrast(.98) brightness(.98);
    }
    .card-title{
      font-size:clamp(24px,3.3vw,34px);
      line-height:1;
      letter-spacing:.03em;
      text-shadow:0 2px 18px rgba(0,0,0,.85);
    }
    .card-note{
      max-width:250px;
      margin:0;
      color:var(--muted);
      font-family:"Courier New",monospace;
      font-size:13px;
      line-height:1.35;
    }
    .modal{
      position:fixed;
      inset:0;
      z-index:20;
      display:none;
      place-items:center;
      padding:18px;
      background:rgba(0,0,0,.72);
      backdrop-filter:blur(5px);
    }
    .modal.open{display:grid}
    .dialog{
      width:min(460px,100%);
      border:1px solid var(--line-strong);
      border-radius:28px;
      background:linear-gradient(180deg,rgba(20,20,20,.96),rgba(4,4,4,.96));
      box-shadow:0 30px 100px rgba(0,0,0,.9);
      padding:24px;
      text-align:center;
    }
    .dialog h2{
      margin:0 0 8px;
      font-size:38px;
      font-weight:400;
      letter-spacing:.03em;
    }
    .dialog p{
      margin:0 auto 20px;
      max-width:360px;
      color:var(--muted);
      font-family:"Courier New",monospace;
      font-size:13px;
      line-height:1.45;
      word-break:break-word;
    }
    .actions{display:grid;grid-template-columns:1fr;gap:10px}
    .action{
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:48px;
      border-radius:999px;
      border:1px solid rgba(242,238,228,.22);
      background:rgba(242,238,228,.08);
      color:var(--ink);
      text-decoration:none;
      font-family:"Courier New",monospace;
      font-weight:800;
      font-size:14px;
      cursor:pointer;
      transition:background .15s,border-color .15s,transform .12s;
    }
    .action:hover,.action:focus-visible{background:rgba(242,238,228,.15);border-color:rgba(242,238,228,.38);transform:translateY(-1px);outline:none}
    .action.primary{background:rgba(242,238,228,.9);color:#050505;border-color:rgba(242,238,228,.92)}
    .status{min-height:18px;margin-top:12px;color:var(--muted);font-family:"Courier New",monospace;font-size:12px}
    .close{margin-top:12px;background:transparent;border:0;color:rgba(242,238,228,.68);font-family:"Courier New",monospace;cursor:pointer;padding:8px}
    footer{
      text-align:center;
      color:rgba(242,238,228,.5);
      font-family:"Courier New",monospace;
      font-size:12px;
      text-shadow:0 2px 18px rgba(0,0,0,.9);
    }
    @media(max-width:860px){
      .page{justify-content:flex-start;padding-top:34px}
      .grid{grid-template-columns:1fr;max-width:460px;margin:0 auto;width:100%}
      .card{min-height:250px;border-radius:24px}
      .icon-wrap{width:148px;border-radius:20px}
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <p class="kicker">central de producción</p>
      <h1>Jonah tenía 15 años</h1>
      <p class="subtitle">Accesos rápidos para producción, ensayos y logística. Tocá una tarjeta para abrir, copiar o compartir el enlace.</p>
    </header>

    <section class="grid" aria-label="Accesos principales">
      <button class="card" type="button" data-title="Drive" data-url="https://drive.google.com/drive/folders/1kHqT7ae_ZD0qsd1G9TFvjYpJXLMS5D2Q?usp=drive_link" data-note="Carpeta madre de producción.">
        <span class="icon-wrap"><img src="Drive icon.png" alt=""></span>
        <span class="card-title">Drive</span>
        <span class="card-note">Carpeta madre de producción</span>
      </button>

      <button class="card" type="button" data-title="Ensayos" data-url="https://jrrguille-bit.github.io/jona-ensayos/" data-note="Disponibilidad de actores y ensayos.">
        <span class="icon-wrap"><img src="ensayos.png" alt=""></span>
        <span class="card-title">Ensayos</span>
        <span class="card-note">Actores y disponibilidad</span>
      </button>

      <button class="card" type="button" data-title="Compras" data-url="https://jrrguille-bit.github.io/jona-logistica-mapa/" data-note="Supermercados, almacenes y farmacias cerca de la casa.">
        <span class="icon-wrap"><img src="compras.png" alt=""></span>
        <span class="card-title">Compras</span>
        <span class="card-note">Supermercados, almacenes y farmacias</span>
      </button>
    </section>

    <footer>GitHub Pages · Jona producción</footer>
  </main>

  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="dialog">
      <h2 id="modalTitle">Acceso</h2>
      <p id="modalNote"></p>
      <div class="actions">
        <a class="action primary" id="goLink" href="#" target="_blank" rel="noopener">Ir al sitio</a>
        <button class="action" id="copyBtn" type="button">Copiar link</button>
        <button class="action" id="shareBtn" type="button">Compartir</button>
      </div>
      <div class="status" id="status" aria-live="polite"></div>
      <button class="close" id="closeBtn" type="button">cerrar</button>
    </div>
  </div>

  <script>
    const modal=document.getElementById('modal');
    const title=document.getElementById('modalTitle');
    const note=document.getElementById('modalNote');
    const goLink=document.getElementById('goLink');
    const copyBtn=document.getElementById('copyBtn');
    const shareBtn=document.getElementById('shareBtn');
    const closeBtn=document.getElementById('closeBtn');
    const status=document.getElementById('status');
    let current={title:'',url:'',note:''};

    function openModal(data){
      current=data;
      title.textContent=data.title;
      note.textContent=data.note+'\n'+data.url;
      goLink.href=data.url;
      status.textContent='';
      modal.classList.add('open');
      goLink.focus();
    }
    function closeModal(){modal.classList.remove('open')}
    document.querySelectorAll('.card').forEach(card=>{
      card.addEventListener('click',()=>openModal({
        title:card.dataset.title,
        url:card.dataset.url,
        note:card.dataset.note
      }));
    });
    copyBtn.addEventListener('click',async()=>{
      try{
        await navigator.clipboard.writeText(current.url);
        status.textContent='Link copiado.';
      }catch(e){
        status.textContent=current.url;
      }
    });
    shareBtn.addEventListener('click',async()=>{
      if(navigator.share){
        try{
          await navigator.share({title:current.title,text:current.note,url:current.url});
          status.textContent='Compartido.';
        }catch(e){status.textContent=''}
      }else{
        try{
          await navigator.clipboard.writeText(current.url);
          status.textContent='Compartir no está disponible acá. Link copiado.';
        }catch(e){status.textContent=current.url}
      }
    });
    closeBtn.addEventListener('click',closeModal);
    modal.addEventListener('click',event=>{if(event.target===modal)closeModal()});
    window.addEventListener('keydown',event=>{if(event.key==='Escape')closeModal()});
  </script>
</body>
</html>
