<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dineros Tumberos</title>
  <style>
    :root{--bg:#080808;--card:#151515;--ink:#f4f1e8;--muted:#bdb5a6;--line:rgba(244,241,232,.22);--ok:#d8ffd8;--bad:#ffd8d8}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:radial-gradient(circle at top,#222 0,#080808 50%,#020202 100%);color:var(--ink);font-family:Arial,Helvetica,sans-serif;display:grid;place-items:center;padding:22px}
    main{width:min(440px,100%);background:linear-gradient(180deg,rgba(21,21,21,.96),rgba(7,7,7,.96));border:1px solid var(--line);border-radius:28px;padding:26px;box-shadow:0 28px 90px rgba(0,0,0,.65)}
    h1{margin:0 0 8px;font-size:30px;line-height:1.05}
    p{margin:0 0 24px;color:var(--muted);font-size:14px;line-height:1.45}
    label{display:block;margin:18px 0 7px;font-weight:800;font-size:15px}
    select,input,button{width:100%;border-radius:16px;border:1px solid var(--line);font-size:18px;padding:14px;background:#0f0f0f;color:var(--ink)}
    button{margin-top:24px;background:var(--ink);color:#050505;font-weight:900;cursor:pointer;border:0}
    button:disabled{opacity:.65;cursor:wait}
    .status{min-height:22px;margin-top:16px;font-weight:800;font-size:14px;color:var(--muted)}
    .status.ok{color:var(--ok)}
    .status.bad{color:var(--bad)}
    .note{margin-top:18px;font-size:12px;color:rgba(244,241,232,.58)}
    iframe{display:none;width:0;height:0;border:0}
  </style>
</head>
<body>
  <main>
    <h1>Dineros Tumberos</h1>
    <p>Carga simple. La página no muestra registros anteriores. La información se manda al Google Sheet.</p>

    <form id="form" action="https://script.google.com/macros/s/AKfycbxw3GF1wDtf0Txg_VBknssIRq-M1EGX0O5lhUxKgGmYbsMaW2wrB0FNeDon9N9s3MFvLg/exec" method="post" target="respuesta_oculta" autocomplete="off">
      <label for="nombre">Quién pagó</label>
      <select id="nombre" name="nombre" required>
        <option value="">Elegir nombre</option>
        <option value="Pedro">Pedro</option>
        <option value="Manu">Manu</option>
        <option value="Male">Male</option>
        <option value="Maite">Maite</option>
        <option value="Mateo">Mateo</option>
      </select>

      <label for="monto">Cuánto pagó</label>
      <input id="monto" name="monto" type="number" inputmode="decimal" step="0.01" min="0" placeholder="Ej: 1500" required>

      <button id="boton" type="submit">Guardar</button>
      <div id="status" class="status" aria-live="polite"></div>
      <div class="note">Si alguien tiene este link puede cargar datos, pero no puede ver el Sheet desde esta página.</div>
    </form>

    <iframe id="iframe" name="respuesta_oculta"></iframe>
  </main>

  <script>
    const form=document.getElementById('form');
    const boton=document.getElementById('boton');
    const statusBox=document.getElementById('status');
    let enviado=false;
    let timer=null;

    function destrabar(){
      boton.disabled=false;
      boton.textContent='Guardar';
      enviado=false;
      if(timer){clearTimeout(timer);timer=null}
    }

    form.addEventListener('submit',()=>{
      enviado=true;
      boton.disabled=true;
      boton.textContent='Guardando...';
      statusBox.className='status';
      statusBox.textContent='Mandando al Sheet...';
      timer=setTimeout(()=>{
        if(!enviado)return;
        statusBox.className='status bad';
        statusBox.textContent='No llegó respuesta del Apps Script. Revisá la implementación.';
        destrabar();
      },15000);
    });

    window.addEventListener('message',event=>{
      const data=event.data||{};
      if(data.source!=='dineros-tumberos')return;
      if(data.ok){
        statusBox.className='status ok';
        statusBox.textContent='Guardado. Revisá el Google Sheet.';
        form.reset();
      }else{
        statusBox.className='status bad';
        statusBox.textContent=data.message||'Error al guardar.';
      }
      destrabar();
    });
  </script>
</body>
</html>
